{% extends "base.html" %}

{% block content %}
<div class="animate-fade-in-up">
    <div class="glass-panel mx-auto reveal" style="max-width: 650px; padding: 3rem; border: 1px solid var(--glass-border);">
        <div class="text-center mb-6">
            <div style="width: 64px; height: 64px; background: rgba(99, 102, 241, 0.1); border-radius: 16px; display: flex; align-items: center; justify-content: center; margin: 0 auto 1.5rem; color: var(--primary);">
                <i class="fas fa-rocket" style="font-size: 1.75rem;"></i>
            </div>
            <h1 class="h3 mb-2" style="font-weight: 800; letter-spacing: -0.02em;">Deploy New Mission</h1>
            <p class="text-muted">Define the scope and difficulty to attract the best student talent.</p>
        </div>

        <form method="POST" action="{{ url_for('company.create_task') }}" class="space-y-5">
            <div class="form-group mb-4">
                <label class="form-label" for="title" style="font-size: 0.8rem; text-transform: uppercase; font-weight: 700; letter-spacing: 1px; color: var(--text-subtle);">Mission Title</label>
                <input type="text" id="title" name="title" class="form-control" required placeholder="e.g., UI/UX Research for Fintech App" style="height: 52px; border-radius: 12px; border: 1px solid var(--glass-border); background: rgba(0,0,0,0.2); padding: 0 1.25rem; color: white;">
            </div>

            <div class="form-group mb-4">
                <label class="form-label" for="description" style="font-size: 0.8rem; text-transform: uppercase; font-weight: 700; letter-spacing: 1px; color: var(--text-subtle);">Briefing & Requirements</label>
                <textarea id="description" name="description" class="form-control" rows="6" required placeholder="Outline the objectives, deliverables, and any specific tools required..." style="border-radius: 12px; border: 1px solid var(--glass-border); background: rgba(0,0,0,0.2); padding: 1.25rem; color: white; line-height: 1.6;"></textarea>
            </div>

            <div class="form-group mb-5">
                <label class="form-label" for="difficulty" style="font-size: 0.8rem; text-transform: uppercase; font-weight: 700; letter-spacing: 1px; color: var(--text-subtle);">Mission Complexity</label>
                <div style="position: relative;">
                    <select id="difficulty" name="difficulty" class="form-control" required style="height: 52px; border-radius: 12px; border: 1px solid var(--glass-border); background: rgba(0,0,0,0.2); appearance: none; padding-left: 1.25rem; color: white;">
                        <option value="Beginner">Beginner - Basic concepts & tasks</option>
                        <option value="Intermediate">Intermediate - Real-world problem solving</option>
                        <option value="Expert">Expert - Complex systems & architecture</option>
                    </select>
                    <i class="fas fa-chevron-down" style="position: absolute; right: 1.25rem; top: 1.25rem; font-size: 0.8rem; pointer-events: none; opacity: 0.5;"></i>
                </div>
            </div>

            <div class="pt-2">
                <button type="submit" class="btn btn-primary" style="width: 100%; height: 56px; border-radius: 12px; font-weight: 800; font-size: 1rem; letter-spacing: 0.5px; box-shadow: 0 8px 25px rgba(99, 102, 241, 0.4);">
                    Launch Mission <i class="fas fa-paper-plane ms-2"></i>
                </button>
            </div>
        </form>
    </div>
</div>
{% endblock %}
